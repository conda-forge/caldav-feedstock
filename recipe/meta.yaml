{% set name = "caldav" %}
{% set version = "3.0.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/caldav-{{ version }}.tar.gz
  sha256: a3ac848c8b9d63c36ede36dff0c07bf6fd06426074d25453c992795f2f7ad96d

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - lxml
    - niquests
    - icalendar >=6.0.0
    - icalendar-searcher >=1.0.5,<2
    - recurring-ical-events >=2.0.0
    - dnspython
    - python-dateutil
    - typing-extensions
    - pyyaml

test:
  imports:
    - caldav
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip
    - typing-extensions


about:
  home: https://github.com/python-caldav/caldav
  summary: CalDAV (RFC4791) client library
  license: GPL-3.0-only AND Apache-2.0
  license_file:
    - COPYING.APACHE
    - COPYING.GPL

extra:
  recipe-maintainers:
    - tdido
