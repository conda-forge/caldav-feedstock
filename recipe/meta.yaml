{% set name = "caldav" %}
{% set version = "3.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/caldav-{{ version }}.tar.gz
  sha256: 002f0c675c5fbe8d8e87387e19fb1a8ef6ee74e41ecf31978fe37b48869be841

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - lxml
    - niquests
    - icalendar
    - recurring-ical-events >=2.0.0
    - pytz
    - tzlocal
    - typing-extensions

test:
  imports:
    - caldav
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip
    - typing-extensions


about:
  home: https://github.com/python-caldav/caldav
  summary: CalDAV (RFC4791) client library
  license: GPL-3.0-only AND Apache-2.0
  license_file:
    - COPYING.APACHE
    - COPYING.GPL

extra:
  recipe-maintainers:
    - tdido
