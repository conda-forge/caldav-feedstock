{% set name = "caldav" %}
{% set version = "3.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/caldav-{{ version }}.tar.gz
  sha256: 0b6dc76a462c0c32a6dbdc537eda832226bd4d9dacf3906247626b68db5b10b6

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - lxml
    - niquests
    - icalendar >=6.0.0
    - icalendar-searcher >=1.0.5,<2
    - recurring-ical-events >=2.0.0
    - dnspython
    - python-dateutil
    - typing-extensions
    - pyyaml

test:
  imports:
    - caldav
  commands:
    - pip check
  requires:
    - python {{ python_min }}
    - pip
    - typing-extensions


about:
  home: https://github.com/python-caldav/caldav
  summary: CalDAV (RFC4791) client library
  license: GPL-3.0-only AND Apache-2.0
  license_file:
    - COPYING.APACHE
    - COPYING.GPL

extra:
  recipe-maintainers:
    - tdido
